name: Release Folio CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Apple Silicon CLI
    runs-on: macos-14
    env:
      TARGET: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add "$TARGET"

      - name: Build folio
        run: cargo build -p foliofs-client --release --features tray --target "$TARGET"

      - name: Package
        run: |
          set -euo pipefail
          mkdir -p "dist/folio-$TARGET"
          cp "target/$TARGET/release/folio" "dist/folio-$TARGET/folio"
          tar -C "dist/folio-$TARGET" -czf "dist/folio-$TARGET.tar.gz" folio
          shasum -a 256 "dist/folio-$TARGET.tar.gz" > "dist/folio-$TARGET.tar.gz.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/folio-aarch64-apple-darwin.tar.gz
            dist/folio-aarch64-apple-darwin.tar.gz.sha256
          draft: false
          prerelease: false
